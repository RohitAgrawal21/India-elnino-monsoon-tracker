name: Daily Data Update

on:
  schedule:
    # Runs at 4:00 AM IST (10:30 PM UTC previous day) every day
    # IST = UTC + 5:30, so 4:00 AM IST = 22:30 UTC
    - cron: '30 22 * * *'
  workflow_dispatch: # allows manual trigger from GitHub website

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pdfplumber beautifulsoup4

      - name: Run scraper
        run: python scraper/runner.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/history.json
          git diff --cached --quiet || git commit -m "Daily data update $(date -u +%Y-%m-%d)"
          git push
