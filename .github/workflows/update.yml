name: Daily Data Update

on:
  schedule:
    # Runs at 4:00 AM IST (10:30 PM UTC previous day) every day
    # IST = UTC + 5:30, so 4:00 AM IST = 22:30 UTC
    - cron: '30 22 * * *'
  workflow_dispatch: # allows manual trigger from GitHub website

permissions:
  contents: write
  issues: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests pdfplumber beautifulsoup4

      - name: Run scraper
        run: python scraper/runner.py

      - name: Run analysis engine
        run: python scraper/analysis_runner.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json data/history.json docs/latest.json docs/history.json docs/analysis.json
          git diff --cached --quiet || git commit -m "Daily data update $(date -u +%Y-%m-%d)"
          git push

      - name: Close stale failure issue if run succeeded
        if: success()
        run: |
          ISSUE=$(gh issue list --label "bot:data-update-failed" --state open --json number -q '.[0].number')
          if [ -n "$ISSUE" ]; then
            gh issue close "$ISSUE" -c "Resolved: daily update succeeded on $(date -u +%Y-%m-%d)."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open issue on failure
        if: failure()
        run: |
          EXISTING=$(gh issue list --label "bot:data-update-failed" --state open --json number -q '.[0].number')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "Still failing as of $(date -u +%Y-%m-%d %H:%M) UTC. [Run log](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          else
            gh issue create \
              --title "Daily data update failed $(date -u +%Y-%m-%d)" \
              --label "bot:data-update-failed" \
              --body "The daily scraper workflow failed. [View run log](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}). This issue will auto-close when the next run succeeds."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
