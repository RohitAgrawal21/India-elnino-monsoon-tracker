<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>India El Nino Monsoon Tracker 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0a0a0f;
  color: #e0e0e0;
  line-height: 1.6;
  min-height: 100vh;
}
.container { max-width: 1280px; margin: 0 auto; padding: 20px 16px; }

/* Header */
.header {
  text-align: center;
  padding: 30px 0 20px;
}
.header h1 {
  font-size: 2rem;
  font-weight: 900;
  background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.5px;
}
.header .tagline {
  color: #888;
  font-size: 0.9rem;
  margin-top: 4px;
}

/* Current Read - Hero Card */
.hero {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  border: 1px solid #2a2a4a;
  border-radius: 16px;
  padding: 24px 28px;
  margin-bottom: 24px;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4ecdc4);
}
.hero-label {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: #ffd93d;
  font-weight: 700;
  margin-bottom: 10px;
}
.hero-text {
  font-size: 1.05rem;
  line-height: 1.7;
  color: #d0d0d0;
}
.hero-text strong { color: #fff; }
.hero-updated {
  font-size: 0.72rem;
  color: #555;
  margin-top: 12px;
}

/* Traffic Light Indicator */
.traffic-light {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(0,0,0,0.3);
  padding: 8px 16px;
  border-radius: 20px;
  margin-bottom: 14px;
}
.tl-dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.1);
}
.tl-dot.active { border-color: transparent; box-shadow: 0 0 8px currentColor; }
.tl-green { background: #555; color: #6bcb77; }
.tl-green.active { background: #6bcb77; }
.tl-yellow { background: #555; color: #ffd93d; }
.tl-yellow.active { background: #ffd93d; }
.tl-red { background: #555; color: #ff6b6b; }
.tl-red.active { background: #ff6b6b; }
.tl-label { font-size: 0.8rem; font-weight: 700; color: #ccc; }

/* Section Grid */
.sections {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 20px;
  margin-bottom: 24px;
}
@media (max-width: 960px) {
  .sections { grid-template-columns: 1fr; }
}

/* Section Cards */
.section {
  background: #12121a;
  border: 1px solid #1e1e2e;
  border-radius: 14px;
  overflow: hidden;
}
.section-header {
  padding: 14px 18px;
  font-size: 0.75rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-header .icon { font-size: 1.1rem; }
.sec-enso .section-header { background: linear-gradient(135deg, #2d1b1b, #1a1215); color: #ff6b6b; border-bottom: 1px solid #ff6b6b33; }
.sec-iod .section-header { background: linear-gradient(135deg, #1b2d1e, #121a15); color: #6bcb77; border-bottom: 1px solid #6bcb7733; }
.sec-india .section-header { background: linear-gradient(135deg, #1b1f2d, #12151a); color: #4ecdc4; border-bottom: 1px solid #4ecdc433; }
.section-body { padding: 6px 0; }

/* Metric Cards */
.metric {
  padding: 16px 18px;
  border-bottom: 1px solid #1a1a28;
  transition: background 0.2s;
}
.metric:last-child { border-bottom: none; }
.metric:hover { background: #16161f; }
.metric-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
}
.metric-label {
  font-size: 0.72rem;
  color: #777;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.metric-value {
  font-size: 2rem;
  font-weight: 800;
  margin: 4px 0 2px;
  letter-spacing: -1px;
}
.metric-trend {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 0.78rem;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 12px;
  margin-top: 6px;
}
.trend-up { background: #ff6b6b22; color: #ff6b6b; }
.trend-down { background: #4ecdc422; color: #4ecdc4; }
.trend-steady { background: #ffd93d22; color: #ffd93d; }

/* Explanation Box */
.explain {
  background: #1a1a28;
  border-left: 3px solid;
  border-radius: 0 8px 8px 0;
  padding: 10px 14px;
  margin-top: 10px;
  font-size: 0.8rem;
  line-height: 1.5;
  color: #aaa;
}
.explain strong { color: #ddd; }
.sec-enso .explain { border-color: #ff6b6b; }
.sec-iod .explain { border-color: #6bcb77; }
.sec-india .explain { border-color: #4ecdc4; }

.metric-sub {
  font-size: 0.78rem;
  color: #666;
  margin-top: 2px;
}
.metric-source {
  font-size: 0.65rem;
  color: #444;
  margin-top: 8px;
}
.metric-source a { color: #4a6fa5; text-decoration: none; }
.metric-source a:hover { color: #6b8fc5; }

/* Big Number Colors */
.val-hot { color: #ff6b6b; }
.val-warm { color: #ffa502; }
.val-cool { color: #4ecdc4; }
.val-neutral { color: #aaa; }
.val-green { color: #6bcb77; }
.val-blue { color: #74b9ff; }
.val-red { color: #ff4757; }

/* Badges */
.badge {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 6px;
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.badge-advisory { background: #ff6b6b33; color: #ff6b6b; border: 1px solid #ff6b6b55; }
.badge-watch { background: #ffd93d33; color: #ffd93d; border: 1px solid #ffd93d55; }
.badge-warning { background: #ff475733; color: #ff4757; border: 1px solid #ff475755; }
.badge-neutral { background: #4ecdc433; color: #4ecdc4; border: 1px solid #4ecdc455; }
.badge-stale { background: #ffd93d1a; color: #bba520; border: 1px solid #ffd93d33; }

/* Category Bar */
.cat-bar {
  display: flex;
  height: 28px;
  border-radius: 6px;
  overflow: hidden;
  margin: 8px 0;
  gap: 2px;
}
.cat-bar div {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.65rem;
  font-weight: 700;
  color: #fff;
  border-radius: 4px;
}
.cat-le { background: #0984e3; }
.cat-e { background: #74b9ff; }
.cat-n { background: #6bcb77; }
.cat-d { background: #ffa502; }
.cat-ld { background: #ff4757; }
.cat-nr { background: #555; }
.cat-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 6px;
}
.cat-legend span {
  font-size: 0.65rem;
  color: #888;
  display: flex;
  align-items: center;
  gap: 4px;
}
.cat-legend .dot {
  width: 8px; height: 8px;
  border-radius: 3px;
  display: inline-block;
}

/* History Chart */
.chart-card {
  background: #12121a;
  border: 1px solid #1e1e2e;
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 24px;
}
.chart-card h3 {
  font-size: 0.85rem;
  color: #888;
  margin-bottom: 12px;
  font-weight: 600;
}
canvas { width: 100% !important; height: 200px !important; }

/* IOD Visual */
.iod-scale {
  display: flex;
  align-items: center;
  gap: 0;
  margin: 10px 0;
  height: 8px;
  border-radius: 4px;
  overflow: hidden;
}
.iod-neg { background: linear-gradient(90deg, #ff4757, #ff6b6b88); flex: 1; height: 100%; }
.iod-neut { background: #444; flex: 0.5; height: 100%; }
.iod-pos { background: linear-gradient(90deg, #6bcb7788, #6bcb77); flex: 1; height: 100%; }
.iod-marker {
  position: relative;
  margin: 4px 0 0;
  font-size: 0.7rem;
  color: #888;
  display: flex;
  justify-content: space-between;
}

/* Footer */
.footer {
  text-align: center;
  padding: 24px 0;
  font-size: 0.72rem;
  color: #444;
  border-top: 1px solid #1a1a28;
}

/* Sparkline */
.sparkline {
  display: inline-block;
  vertical-align: middle;
  margin-left: 8px;
}

/* Stress Index Arc */
.stress-wrap {
  display: flex;
  align-items: center;
  gap: 20px;
  margin: 12px 0;
}
.stress-arc {
  position: relative;
  width: 140px;
  height: 78px;
  flex-shrink: 0;
}
.stress-number {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  font-size: 1.6rem;
  font-weight: 900;
  letter-spacing: -1px;
}
.stress-label-row {
  display: flex;
  justify-content: space-between;
  font-size: 0.6rem;
  color: #555;
  width: 140px;
  margin-top: 2px;
}
.stress-info {
  flex: 1;
}
.stress-info .stress-title {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #888;
  font-weight: 700;
}
.stress-info .stress-verdict {
  font-size: 1.1rem;
  font-weight: 700;
  margin: 2px 0;
}
.stress-info .stress-explain {
  font-size: 0.78rem;
  color: #777;
  line-height: 1.4;
}

/* IRI Probability Bar */
.prob-bar-wrap {
  margin: 8px 0;
}
.prob-bar {
  display: flex;
  height: 32px;
  border-radius: 6px;
  overflow: hidden;
  gap: 2px;
}
.prob-bar div {
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.72rem;
  font-weight: 700;
  color: #fff;
  border-radius: 4px;
}
.prob-elnino { background: #ff6b6b; }
.prob-neutral { background: #888; }
.prob-nina { background: #4ecdc4; }

.loading {
  text-align: center;
  padding: 80px 20px;
  color: #555;
  font-size: 1.1rem;
}

/* Hero Split Numbers */
.hero-split {
  display: flex;
  gap: 20px;
  margin: 14px 0;
}
@media (max-width: 600px) { .hero-split { flex-direction: column; gap: 12px; } }
.hero-num-card {
  flex: 1;
  background: rgba(0,0,0,0.25);
  border-radius: 12px;
  padding: 16px 20px;
  border: 1px solid #2a2a4a;
}
.hero-num-label {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: #888;
  font-weight: 700;
}
.hero-num-value {
  font-size: 2.2rem;
  font-weight: 900;
  letter-spacing: -1px;
  margin: 2px 0;
}
.hero-num-sub {
  font-size: 0.78rem;
  color: #999;
  line-height: 1.4;
}

/* Section Summary Badge */
.sec-summary {
  padding: 10px 18px;
  font-size: 0.78rem;
  color: #bbb;
  border-bottom: 1px solid #1a1a28;
  display: flex;
  align-items: center;
  gap: 8px;
}
.sec-summary .sum-val {
  font-size: 1.2rem;
  font-weight: 800;
}

/* India Cartogram */
.cartogram-wrap {
  margin: 10px 0 4px;
}
.cartogram-grid {
  display: inline-grid;
  gap: 2px;
}
.carto-cell {
  width: 36px;
  height: 28px;
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.5rem;
  font-weight: 700;
  color: #fff;
  cursor: default;
  position: relative;
}
.carto-cell:hover { opacity: 0.85; outline: 1px solid #fff; }
.carto-empty { background: transparent; }

/* Gauge */
.gauge-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 6px 0;
}
.gauge {
  flex: 1;
  height: 8px;
  background: #1e1e2e;
  border-radius: 4px;
  overflow: hidden;
}
.gauge-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.5s;
}
.gauge-label {
  font-size: 0.75rem;
  color: #888;
  min-width: 40px;
  text-align: right;
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>India El Nino Monsoon Tracker</h1>
    <p class="tagline">Will the 2026 El Nino hurt India's monsoon? Track it daily.</p>
  </div>
  <div id="app" class="loading">Loading latest data...</div>
</div>

<script>
const DATA_URL = 'latest.json';
const HISTORY_URL = 'history.json';

async function loadData() {
  try {
    const [latestRes, historyRes] = await Promise.all([fetch(DATA_URL), fetch(HISTORY_URL)]);
    if (!latestRes.ok) throw new Error('Could not load data');
    const latest = await latestRes.json();
    let history = [];
    try { history = await historyRes.json(); } catch(e) {}
    render(latest, history);
  } catch (e) {
    document.getElementById('app').innerHTML =
      '<p style="color:#ff6b6b;font-size:1.1rem">Could not load data: ' + e.message + '</p>' +
      '<p style="margin-top:10px;color:#666">The scraper may not have run yet. Check back soon.</p>';
  }
}

function getElNinoStrength(val) {
  if (val === null || val === undefined) return { label: 'Unknown', color: 'val-neutral' };
  const v = Math.abs(val);
  if (v >= 2.0) return { label: 'Very Strong', color: 'val-red' };
  if (v >= 1.5) return { label: 'Strong', color: 'val-hot' };
  if (v >= 1.0) return { label: 'Moderate', color: 'val-warm' };
  if (v >= 0.5) return { label: 'Weak', color: 'val-warm' };
  return { label: 'Borderline', color: 'val-neutral' };
}

function getThreatLevel(m) {
  const nino34 = m.nino34 && m.nino34.value;
  const dep = m.imd_rainfall && m.imd_rainfall.country_departure_pct;
  const iod = m.iod_dmi && m.iod_dmi.value;

  let score = 0;
  if (nino34 !== null && nino34 !== undefined) {
    if (nino34 >= 1.5) score += 3;
    else if (nino34 >= 1.0) score += 2;
    else if (nino34 >= 0.5) score += 1;
  }
  if (dep !== null && dep !== undefined) {
    if (dep <= -40) score += 3;
    else if (dep <= -20) score += 2;
    else if (dep <= -10) score += 1;
  }
  if (iod !== null && iod !== undefined) {
    if (iod < -0.4) score += 1;
    else if (iod > 0.4) score -= 1;
  }

  if (score >= 5) return { level: 'high', label: 'High Concern', dot: 'red' };
  if (score >= 3) return { level: 'medium', label: 'Moderate Concern', dot: 'yellow' };
  return { level: 'low', label: 'Low Concern', dot: 'green' };
}

function trendBadge(t) {
  if (t === 'rising') return '<span class="metric-trend trend-up">&#9650; Rising</span>';
  if (t === 'falling') return '<span class="metric-trend trend-down">&#9660; Falling</span>';
  return '<span class="metric-trend trend-steady">&#9654; Steady</span>';
}

function staleBlock(note) {
  return '<div style="padding:10px 0"><span class="badge badge-stale">STALE / UNREACHABLE</span>' +
    (note ? '<div style="font-size:0.75rem;color:#666;margin-top:6px">' + note + '</div>' : '') + '</div>';
}

function sourceLine(m) {
  if (!m) return '';
  const ts = m.fetched_at ? new Date(m.fetched_at).toLocaleString('en-IN', {dateStyle:'medium',timeStyle:'short'}) : '?';
  return '<div class="metric-source"><a href="' + (m.source_url||'#') + '" target="_blank">' + (m.source||'') + '</a> &bull; ' + ts + '</div>';
}

function alertBadge(status) {
  if (!status) return '<span class="badge badge-stale">Unknown</span>';
  const s = status.toLowerCase();
  if (s.includes('warning')) return '<span class="badge badge-warning">' + status + '</span>';
  if (s.includes('advisory')) return '<span class="badge badge-advisory">' + status + '</span>';
  if (s.includes('watch')) return '<span class="badge badge-watch">' + status + '</span>';
  return '<span class="badge badge-neutral">' + status + '</span>';
}

function catBar(counts) {
  if (!counts) return '<span class="badge badge-stale">No data</span>';
  const cats = [
    { key: 'Large Excess', cls: 'cat-le', short: 'L.Excess', color: '#0984e3' },
    { key: 'Excess', cls: 'cat-e', short: 'Excess', color: '#74b9ff' },
    { key: 'Normal', cls: 'cat-n', short: 'Normal', color: '#6bcb77' },
    { key: 'Deficient', cls: 'cat-d', short: 'Deficit', color: '#ffa502' },
    { key: 'Large Deficient', cls: 'cat-ld', short: 'L.Deficit', color: '#ff4757' },
    { key: 'No Rain', cls: 'cat-nr', short: 'No Rain', color: '#555' },
  ];
  const total = cats.reduce((s, c) => s + ((counts[c.key] && counts[c.key].subdivisions) || 0), 0);
  if (total === 0) return '<span class="badge badge-stale">No data</span>';

  let bar = '<div class="cat-bar">';
  cats.forEach(c => {
    const n = (counts[c.key] && counts[c.key].subdivisions) || 0;
    if (n === 0) return;
    const pct = (n / total * 100).toFixed(1);
    bar += '<div class="' + c.cls + '" style="width:' + pct + '%">' + (parseFloat(pct) > 10 ? n : '') + '</div>';
  });
  bar += '</div>';
  bar += '<div class="cat-legend">';
  cats.forEach(c => {
    const n = (counts[c.key] && counts[c.key].subdivisions) || 0;
    if (n === 0) return;
    const a = (counts[c.key] && counts[c.key].pct_area) || 0;
    bar += '<span><span class="dot" style="background:' + c.color + '"></span>' + c.short + ': ' + n + ' (' + a + '%)</span>';
  });
  bar += '</div>';
  return bar;
}

function sparklineSVG(values, color, w, h, label) {
  if (!values || values.length < 2) return '';
  w = w || 60; h = h || 20;
  const min = Math.min(...values);
  const max = Math.max(...values);
  const range = max - min || 1;
  const pts = values.map((v, i) =>
    ((i / (values.length - 1)) * w).toFixed(1) + ',' +
    (h - ((v - min) / range * (h - 4) + 2)).toFixed(1)
  ).join(' ');
  const last = values[values.length-1];
  const prev = values[values.length-2];
  const arrow = last > prev ? '&#9650;' : last < prev ? '&#9660;' : '&#9654;';
  const arrowColor = last > prev ? '#ff6b6b' : last < prev ? '#4ecdc4' : '#888';
  let labelHtml = '';
  if (label) {
    labelHtml = '<span style="font-size:0.6rem;color:' + arrowColor + ';margin-left:3px;vertical-align:middle">' + arrow + ' ' + label + '</span>';
  }
  return '<svg class="sparkline" width="' + w + '" height="' + h + '" viewBox="0 0 ' + w + ' ' + h + '">' +
    '<polyline points="' + pts + '" fill="none" stroke="' + color + '" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>' +
    '<circle cx="' + ((values.length-1) / (values.length-1) * w).toFixed(1) + '" cy="' +
    (h - ((last - min) / range * (h-4) + 2)).toFixed(1) + '" r="2" fill="' + color + '"/>' +
    '</svg>' + labelHtml;
}

function getHistoryValues(history, key) {
  return history.map(h => h[key]).filter(v => v !== null && v !== undefined);
}

function stressArcSVG(score) {
  const r = 50, cx = 70, cy = 62, sw = 10;
  const color = score >= 70 ? '#ff4757' : score >= 50 ? '#ffa502' : score >= 30 ? '#ffd93d' : '#6bcb77';
  const pct = score / 100;
  const gapAngle = 0.15;
  const totalAngle = Math.PI - 2 * gapAngle;
  const startX = cx + r * Math.cos(Math.PI - gapAngle);
  const startY = cy - r * Math.sin(Math.PI - gapAngle);
  const endX = cx + r * Math.cos(gapAngle);
  const endY = cy - r * Math.sin(gapAngle);
  const bgArc = 'M ' + startX.toFixed(1) + ' ' + startY.toFixed(1) + ' A ' + r + ' ' + r + ' 0 1 1 ' + endX.toFixed(1) + ' ' + endY.toFixed(1);
  const fgAngle = Math.PI - gapAngle - pct * totalAngle;
  const fgX = cx + r * Math.cos(fgAngle);
  const fgY = cy - r * Math.sin(fgAngle);
  const largeFlag = (pct * totalAngle > Math.PI) ? 1 : 0;
  const fgArc = 'M ' + startX.toFixed(1) + ' ' + startY.toFixed(1) + ' A ' + r + ' ' + r + ' 0 ' + largeFlag + ' 1 ' + fgX.toFixed(1) + ' ' + fgY.toFixed(1);
  return '<svg width="140" height="78" viewBox="0 0 140 78">' +
    '<path d="' + bgArc + '" fill="none" stroke="#2a2a3a" stroke-width="' + sw + '" stroke-linecap="round"/>' +
    (pct > 0.01 ? '<path d="' + fgArc + '" fill="none" stroke="' + color + '" stroke-width="' + sw + '" stroke-linecap="round"/>' : '') +
    '<circle cx="' + fgX.toFixed(1) + '" cy="' + fgY.toFixed(1) + '" r="3.5" fill="' + color + '" stroke="#0a0a0f" stroke-width="1.5"/>' +
    '</svg>';
}

function indiaMapSVG(subdivData) {
  if (!subdivData || Object.keys(subdivData).length === 0) return '';
  // Geographic centers (approximate lat/lon → SVG coords in 300x380 viewBox)
  var COORDS = {
    jammu_kashmir:[148,28],himachal_pradesh:[165,52],punjab:[140,68],haryana_delhi:[152,90],
    uttarakhand:[178,65],arunachal_pradesh:[270,62],shwb_sikkim:[245,80],assam_meghalaya:[262,90],
    nmmt:[270,105],west_rajasthan:[108,120],east_rajasthan:[140,128],west_up:[172,105],
    east_up:[198,105],bihar:[222,110],jharkhand:[222,135],gangetic_wb:[248,130],
    saurashtra_kutch:[80,160],gujarat:[100,175],west_mp:[155,160],east_mp:[185,158],
    chhattisgarh:[200,175],odisha:[225,175],konkan_goa:[108,215],madhya_maharashtra:[135,210],
    marathwada:[155,200],vidarbha:[175,185],coastal_karnataka:[115,255],
    north_interior_karnataka:[138,245],telangana:[168,220],coastal_ap:[185,235],
    south_interior_karnataka:[140,275],kerala:[118,300],rayalaseema:[165,255],
    tamilnadu:[158,290],lakshadweep:[82,310],andaman_nicobar:[275,270],
  };
  var LABELS = {
    jammu_kashmir:'J&K',himachal_pradesh:'HP',punjab:'Pun',haryana_delhi:'Del',uttarakhand:'Utk',
    arunachal_pradesh:'ArP',shwb_sikkim:'Sik',assam_meghalaya:'Asm',nmmt:'NE',
    west_rajasthan:'W.Rj',east_rajasthan:'E.Rj',west_up:'W.UP',east_up:'E.UP',bihar:'Bih',
    jharkhand:'Jhk',gangetic_wb:'WB',saurashtra_kutch:'S&K',gujarat:'Guj',
    west_mp:'W.MP',east_mp:'E.MP',chhattisgarh:'Chh',odisha:'Odi',
    konkan_goa:'Kon',madhya_maharashtra:'M.Mh',marathwada:'Mar',vidarbha:'Vid',
    coastal_karnataka:'C.Ka',north_interior_karnataka:'N.Ka',telangana:'Tel',coastal_ap:'C.AP',
    kerala:'Ker',south_interior_karnataka:'S.Ka',rayalaseema:'Ray',tamilnadu:'TN',
    lakshadweep:'Lak',andaman_nicobar:'A&N',
  };
  var CAT_COLORS = {LE:'#0984e3',E:'#74b9ff',N:'#6bcb77',D:'#ffa502',LD:'#ff4757',NR:'#555'};

  // Simplified India outline path
  var outline = 'M148,8 C130,15 120,30 115,45 L108,55 C100,58 95,65 90,72 L82,85 C78,95 72,110 70,125 L68,140 C65,150 62,160 65,172 L70,185 C72,195 75,205 80,215 L85,225 C88,235 92,245 98,255 L105,270 C108,280 112,290 115,300 L120,310 C125,318 130,322 135,325 L140,328 C145,330 148,326 150,320 L155,310 C158,300 162,292 165,285 L170,275 C175,268 180,260 185,252 L190,242 C195,235 200,228 205,222 L215,210 C220,205 225,198 230,190 L235,180 C238,172 240,165 242,158 L245,148 C248,138 250,128 252,120 L255,110 C258,102 262,95 268,88 L275,80 C278,75 280,68 278,62 L275,55 C270,48 265,42 258,38 L248,32 C240,28 232,26 225,25 L215,24 C205,22 195,20 185,18 L175,15 C165,12 158,10 148,8 Z';

  var h = '<div style="margin:10px 0">';
  h += '<svg viewBox="0 0 310 350" width="100%" style="max-width:320px;height:auto">';
  h += '<path d="' + outline + '" fill="#1a1a28" stroke="#333" stroke-width="1.5"/>';

  Object.keys(COORDS).forEach(function(key) {
    var d = subdivData[key];
    if (!d) return;
    var xy = COORDS[key];
    var cc = d.category_code;
    var bg = CAT_COLORS[cc] || '#555';
    var dep = d.departure_pct;
    var lbl = LABELS[key] || key.substring(0,3);
    var r = 10;
    h += '<circle cx="' + xy[0] + '" cy="' + xy[1] + '" r="' + r + '" fill="' + bg + '" opacity="0.85" stroke="#0a0a0f" stroke-width="1">';
    h += '<title>' + lbl + ': ' + dep + '% (' + d.category + ')</title></circle>';
    h += '<text x="' + xy[0] + '" y="' + (xy[1]+3) + '" text-anchor="middle" font-size="6" font-weight="700" fill="#fff" style="pointer-events:none">' + lbl + '</text>';
  });

  h += '</svg>';
  h += '<div class="cat-legend" style="margin-top:8px">';
  h += '<span><span class="dot" style="background:#0984e3"></span>L.Excess</span>';
  h += '<span><span class="dot" style="background:#74b9ff"></span>Excess</span>';
  h += '<span><span class="dot" style="background:#6bcb77"></span>Normal</span>';
  h += '<span><span class="dot" style="background:#ffa502"></span>Deficit</span>';
  h += '<span><span class="dot" style="background:#ff4757"></span>L.Deficit</span>';
  h += '</div></div>';
  return h;
}

function render(latest, history) {
  const m = latest.metrics;
  const updatedAt = new Date(latest.last_updated).toLocaleString('en-IN', {dateStyle:'medium',timeStyle:'short'});
  const threat = getThreatLevel(m);
  const strength = m.nino34 ? getElNinoStrength(m.nino34.value) : { label: '?', color: 'val-neutral' };
  const stress = latest.stress_index || 50;

  let html = '';

  // Hero with split numbers
  html += '<div class="hero">';

  const stressColor = stress >= 70 ? '#ff4757' : stress >= 50 ? '#ffa502' : stress >= 30 ? '#ffd93d' : '#6bcb77';
  const stressVerdict = stress >= 70 ? 'High Risk' : stress >= 50 ? 'Moderate Risk' : stress >= 30 ? 'Low Risk' : 'Minimal Risk';
  const stressHistory = getHistoryValues(history, 'stress_index');
  const iriProb = m.iri_forecast && m.iri_forecast.elnino_probability;
  const dep = m.imd_rainfall && m.imd_rainfall.country_departure_pct;
  const blended = latest.elnino_blended;
  const blendedProb = blended ? blended.blended_probability : null;

  // Two big numbers side by side
  html += '<div class="hero-split">';

  // Card 1: El Nino Status (blended model)
  html += '<div class="hero-num-card">';
  html += '<div class="hero-num-label">El Nino Probability <span style="font-size:0.55rem;color:#666;text-transform:none;letter-spacing:0">(blended model)</span></div>';
  html += '<div class="hero-num-value val-hot">' + (blendedProb ? blendedProb + '%' : (iriProb ? iriProb + '%' : strength.label)) + '</div>';
  html += '<div class="hero-num-sub">';
  if (blendedProb) {
    html += 'Blended from ' + blended.components.length + ' sources: ';
    html += blended.components.map(function(c) { return c.source + ' ' + c.probability + '%'; }).join(', ') + '. ';
    html += '<br><span style="font-size:0.7rem;color:#555">Confidence: ' + blended.confidence + ' | ';
    html += 'Weights: ' + blended.components.map(function(c) { return c.source + ' ' + c.weight + '%'; }).join(', ') + '</span>';
  } else if (iriProb) {
    html += 'IRI/Columbia model says <strong style="color:#ff6b6b">' + iriProb + '% chance</strong> El Nino continues. ';
  }
  html += '</div></div>';

  // Card 2: Monsoon Impact
  html += '<div class="hero-num-card">';
  html += '<div class="hero-num-label">India Monsoon Stress</div>';
  html += '<div class="hero-num-value" style="color:' + stressColor + '">' + stress + '<span style="font-size:1rem;font-weight:500;color:#666">/100</span>' + (stressHistory.length > 1 ? ' ' + sparklineSVG(stressHistory, stressColor, 50, 18) : '') + '</div>';
  html += '<div class="hero-num-sub">';
  html += '<strong style="color:' + stressColor + '">' + stressVerdict + '.</strong> ';
  if (dep !== null && dep !== undefined) {
    html += 'Rainfall is <strong>' + (dep >= 0 ? dep + '% above' : Math.abs(dep) + '% below') + ' normal</strong>. ';
  }
  html += 'Blends ocean temperature, air pressure, IOD, and actual rainfall.';
  html += '</div></div>';

  html += '</div>'; // end hero-split

  html += '<div class="hero-label">What\'s happening</div>';
  html += '<div class="hero-text">' + buildHeroText(m, strength) + '</div>';
  html += '<div class="hero-updated">Last updated: ' + updatedAt + '</div>';
  html += '</div>';

  // Three sections
  html += '<div class="sections">';

  // === ENSO ===
  html += '<div class="section sec-enso">';
  html += '<div class="section-header"><span class="icon">&#127754;</span> El Nino Status</div>';
  var ensoSum = blendedProb ? blendedProb + '% likely' : (iriProb ? iriProb + '% likely' : (strength.label + ' El Nino'));
  html += '<div class="sec-summary"><span class="sum-val val-hot">' + ensoSum + '</span> &mdash; ' + (m.nino34 && m.nino34.trend ? m.nino34.trend : 'trend unknown') + '</div>';
  html += '<div class="section-body">';

  // Alert
  html += '<div class="metric">';
  html += '<div class="metric-label">NOAA Alert Level</div>';
  if (m.enso_status && m.enso_status.status === 'ok') {
    html += '<div style="margin:6px 0">' + alertBadge(m.enso_status.alert_status) + '</div>';
    html += '<div class="explain"><strong>What this means:</strong> NOAA (the US weather agency) has issued an <strong>Advisory</strong> — they are confident El Nino is happening right now. The scale goes: Watch (might happen) → Advisory (happening) → Warning (strong and happening).</div>';
    if (m.enso_status.elnino_probability) {
      html += '<div class="metric-sub" style="margin-top:8px">Chance of continuing: <strong style="color:#ff6b6b">' + m.enso_status.elnino_probability + '%</strong></div>';
    }
    if (m.enso_status.strong_elnino_probability) {
      html += '<div class="metric-sub">Chance of very strong El Nino: <strong style="color:#ff4757">' + m.enso_status.strong_elnino_probability + '%</strong></div>';
    }
  } else {
    html += staleBlock();
  }
  html += sourceLine(m.enso_status);
  html += '</div>';

  // Nino 3.4
  html += '<div class="metric">';
  html += '<div class="metric-label">Pacific Ocean Temperature</div>';
  if (m.nino34 && m.nino34.status === 'ok') {
    const v = m.nino34.value;
    const vc = v >= 1.5 ? 'val-red' : v >= 0.5 ? 'val-hot' : v >= 0 ? 'val-warm' : 'val-cool';
    const ninoHist = getHistoryValues(history, 'nino34');
    html += '<div class="metric-value ' + vc + '">' + (v >= 0 ? '+' : '') + v.toFixed(2) + '°C' + sparklineSVG(ninoHist, '#ff6b6b', 60, 20, 'temp') + '</div>';
    html += trendBadge(m.nino34.trend);
    html += '<div class="metric-sub">' + m.nino34.period + ' · Strength: <strong>' + strength.label + '</strong></div>';
    html += '<div class="explain"><strong>What this means:</strong> This measures how much warmer the key part of the Pacific Ocean is compared to normal. Above <strong>+0.5°C = El Nino</strong>, above +1.5°C = Strong El Nino. Right now at <strong>' + (v >= 0 ? '+' : '') + v.toFixed(2) + '°C</strong>, it\'s ' + strength.label.toLowerCase() + ' and ' + (m.nino34.trend || 'steady') + '.</div>';
  } else {
    html += staleBlock();
  }
  html += sourceLine(m.nino34);
  html += '</div>';

  // ONI
  html += '<div class="metric">';
  html += '<div class="metric-label">ONI (Official Strength)</div>';
  if (m.oni && m.oni.status === 'ok') {
    const v = m.oni.value;
    const vc = v >= 1.5 ? 'val-red' : v >= 0.5 ? 'val-hot' : v >= 0 ? 'val-warm' : 'val-cool';
    const oniHist = getHistoryValues(history, 'oni');
    html += '<div class="metric-value ' + vc + '">' + (v >= 0 ? '+' : '') + v.toFixed(2) + '°C' + sparklineSVG(oniHist, '#ffa502', 60, 20, 'ONI') + '</div>';
    html += trendBadge(m.oni.trend);
    html += '<div class="metric-sub">' + m.oni.season + ' · Previous: ' + (m.oni.previous_value >= 0 ? '+' : '') + m.oni.previous_value.toFixed(2) + '°C</div>';
    html += '<div class="explain"><strong>What this means:</strong> ONI is the "official scorecard" — a 3-month average that NOAA uses to formally declare El Nino. It changes slowly. Currently ' + (m.oni.trend || 'steady') + ' from ' + (m.oni.previous_value >= 0 ? '+' : '') + m.oni.previous_value.toFixed(2) + '°C.</div>';
  } else {
    html += staleBlock();
  }
  html += sourceLine(m.oni);
  html += '</div>';

  // SOI
  html += '<div class="metric">';
  html += '<div class="metric-label">SOI (Atmosphere Pressure)</div>';
  if (m.soi && m.soi.status === 'ok') {
    const v = m.soi.value;
    const vc = v < -7 ? 'val-red' : v > 7 ? 'val-cool' : 'val-neutral';
    const soiHist = getHistoryValues(history, 'soi');
    html += '<div class="metric-value ' + vc + '">' + v.toFixed(1) + sparklineSVG(soiHist, '#74b9ff', 60, 20, 'pressure') + '</div>';
    html += '<div class="metric-sub">' + m.soi.period + '</div>';
    html += '<div class="explain"><strong>What this means:</strong> SOI measures air pressure difference between Australia and Tahiti. <strong>Negative = El Nino pattern</strong> in the atmosphere, Positive = La Nina. Currently ' + (v < -7 ? 'strongly negative (El Nino signal)' : v < 0 ? 'slightly negative' : 'near neutral') + '.</div>';
  } else {
    html += staleBlock();
  }
  html += sourceLine(m.soi);
  html += '</div>';

  // IRI Forecast
  html += '<div class="metric">';
  html += '<div class="metric-label">IRI/Columbia Forecast</div>';
  if (m.iri_forecast && m.iri_forecast.status === 'ok' && m.iri_forecast.elnino_probability) {
    const ep = m.iri_forecast.elnino_probability;
    const np = m.iri_forecast.neutral_probability || (100 - ep);
    const lp = m.iri_forecast.nina_probability || 0;
    const iriHist = getHistoryValues(history, 'iri_elnino_prob');
    html += '<div class="metric-value val-hot">' + ep + '%' + sparklineSVG(iriHist, '#ff6b6b', 60, 20, 'forecast') + '</div>';
    html += '<div class="metric-sub">El Nino probability' + (m.iri_forecast.forecast_season ? ' for ' + m.iri_forecast.forecast_season : '') + '</div>';
    html += '<div class="prob-bar-wrap"><div class="prob-bar">';
    html += '<div class="prob-elnino" style="width:' + ep + '%" title="El Nino: ' + ep + '%">' + (ep > 15 ? 'El Nino ' + ep + '%' : '') + '</div>';
    if (np > 0) html += '<div class="prob-neutral" style="width:' + np + '%" title="Neutral: ' + np + '%">' + (np > 15 ? np + '%' : '') + '</div>';
    if (lp > 0) html += '<div class="prob-nina" style="width:' + lp + '%" title="La Nina: ' + lp + '%">' + (lp > 15 ? lp + '%' : '') + '</div>';
    html += '</div></div>';
    html += '<div class="explain"><strong>What this means:</strong> Columbia University\'s IRI model gives a <strong>' + ep + '% chance</strong> that El Nino will continue. This is one of the most respected ENSO forecasts in the world. Above 80% = very high confidence.</div>';
  } else {
    html += staleBlock('IRI forecast updates monthly. Could not parse latest probabilities.');
  }
  html += sourceLine(m.iri_forecast);
  html += '</div>';

  html += '</div></div>'; // end ENSO

  // === IOD ===
  html += '<div class="section sec-iod">';
  html += '<div class="section-header"><span class="icon">&#127758;</span> Ocean Modifiers</div>';
  var iodPhase = m.iod_dmi && m.iod_dmi.phase ? m.iod_dmi.phase : '?';
  var iodImpact = iodPhase === 'Positive' ? 'Helping India' : iodPhase === 'Negative' ? 'Hurting India' : 'Neutral effect';
  html += '<div class="sec-summary"><span class="sum-val ' + (iodPhase === 'Positive' ? 'val-green' : iodPhase === 'Negative' ? 'val-red' : 'val-neutral') + '">' + iodPhase + ' IOD</span> &mdash; ' + iodImpact + '</div>';
  html += '<div class="section-body">';

  html += '<div class="metric">';
  html += '<div class="metric-label">DMI Value & Phase</div>';
  if (m.iod_dmi && m.iod_dmi.status === 'ok') {
    const v = m.iod_dmi.value;
    const phase = m.iod_dmi.phase;
    const vc = phase === 'Positive' ? 'val-green' : phase === 'Negative' ? 'val-red' : 'val-neutral';
    const dmiHist = getHistoryValues(history, 'dmi');
    html += '<div class="metric-value ' + vc + '">' + (v >= 0 ? '+' : '') + v.toFixed(3) + '°C' + sparklineSVG(dmiHist, '#6bcb77', 60, 20, 'IOD') + '</div>';
    html += '<div style="margin:6px 0"><span class="badge ' + (phase === 'Positive' ? 'badge-neutral' : phase === 'Negative' ? 'badge-advisory' : 'badge-stale') + '">' + phase + ' Phase</span></div>';
    html += '<div class="metric-sub">' + m.iod_dmi.period + '</div>';

    // IOD Scale visual
    html += '<div class="iod-scale"><div class="iod-neg"></div><div class="iod-neut"></div><div class="iod-pos"></div></div>';
    html += '<div class="iod-marker"><span>-ve (Bad for India)</span><span>Neutral</span><span>+ve (Good for India)</span></div>';

    html += '<div class="explain" style="margin-top:12px"><strong>Why this matters:</strong> The IOD is the <strong>"modifier"</strong> that decides if El Nino actually hurts India\'s rain or not.<br><br>';
    html += '&#9989; <strong>Positive IOD</strong> = Indian Ocean pushes moisture toward India = more rain, offsetting El Nino drought<br>';
    html += '&#10060; <strong>Negative IOD</strong> = moisture pushed away from India = less rain, making El Nino drought worse<br>';
    html += '&#9898; <strong>Neutral</strong> = El Nino\'s impact is uncertain, depends on other factors<br><br>';
    html += 'Currently <strong>' + phase.toLowerCase() + '</strong> — ' + m.iod_dmi.india_impact_note.toLowerCase() + '.</div>';

    if (m.iod_dmi.note) {
      html += '<div class="metric-sub" style="font-style:italic;margin-top:6px">' + m.iod_dmi.note + '</div>';
    }
  } else {
    html += staleBlock();
  }
  html += sourceLine(m.iod_dmi);
  html += '</div>';

  // PDO
  html += '<div class="metric">';
  html += '<div class="metric-label">Pacific Decadal Oscillation (PDO)</div>';
  if (m.pdo && m.pdo.status === 'ok') {
    var pv = m.pdo.value;
    var pp = m.pdo.phase;
    var pvc = pp === 'Negative' ? 'val-green' : pp === 'Positive' ? 'val-red' : 'val-neutral';
    html += '<div class="metric-value ' + pvc + '">' + (pv >= 0 ? '+' : '') + pv.toFixed(2) + '</div>';
    html += '<div style="margin:6px 0"><span class="badge ' + (pp === 'Negative' ? 'badge-neutral' : pp === 'Positive' ? 'badge-advisory' : 'badge-stale') + '">' + pp + ' Phase</span></div>';
    html += '<div class="metric-sub">' + m.pdo.period + '</div>';
    html += '<div class="explain"><strong>Why this matters:</strong> PDO is a <strong>long-term ocean cycle</strong> in the North Pacific (changes over decades, not months).<br><br>';
    html += '&#9989; <strong>Negative PDO</strong> (current) = tends to <strong>weaken</strong> El Nino\'s drought effect on India — this is a protective factor right now<br>';
    html += '&#10060; <strong>Positive PDO</strong> = tends to <strong>amplify</strong> El Nino\'s drought effect on India<br><br>';
    html += 'Currently at <strong>' + pv.toFixed(2) + '</strong> (' + pp.toLowerCase() + ') — ' + m.pdo.india_impact_note.toLowerCase() + '.</div>';
  } else {
    html += staleBlock();
  }
  html += sourceLine(m.pdo);
  html += '</div>';

  html += '</div></div>'; // end IOD

  // === INDIA IMPACT ===
  html += '<div class="section sec-india">';
  html += '<div class="section-header"><span class="icon">&#127470;&#127475;</span> India Monsoon Impact</div>';
  var indiaVerdict = dep === null ? 'Awaiting data' : dep <= -20 ? Math.abs(dep) + '% below normal' : dep >= 20 ? dep + '% above normal' : 'Near normal';
  var indiaVc = dep === null ? 'val-neutral' : dep <= -20 ? 'val-warm' : dep >= 20 ? 'val-cool' : 'val-green';
  html += '<div class="sec-summary"><span class="sum-val ' + indiaVc + '">' + (dep !== null ? (dep >= 0 ? '+' : '') + dep + '%' : '?') + '</span> &mdash; Rainfall ' + indiaVerdict.toLowerCase() + '</div>';
  html += '<div class="section-body">';

  // Rainfall
  html += '<div class="metric">';
  html += '<div class="metric-label">Monsoon Rainfall So Far</div>';
  if (m.imd_rainfall && m.imd_rainfall.status === 'ok') {
    const dep = m.imd_rainfall.country_departure_pct;
    let vc = 'val-green';
    let verdict = 'Normal';
    if (dep !== null && dep !== undefined) {
      if (dep <= -60) { vc = 'val-red'; verdict = 'Severely Deficient'; }
      else if (dep <= -20) { vc = 'val-warm'; verdict = 'Below Normal'; }
      else if (dep >= 60) { vc = 'val-blue'; verdict = 'Large Excess'; }
      else if (dep >= 20) { vc = 'val-cool'; verdict = 'Above Normal'; }
    }
    const rainHist = getHistoryValues(history, 'rainfall_departure_pct');
    html += '<div class="metric-value ' + vc + '">' + (dep !== null ? (dep >= 0 ? '+' : '') + dep + '%' : 'N/A') + sparklineSVG(rainHist, '#4ecdc4', 60, 20, 'rain') + '</div>';
    html += '<div class="metric-sub">' + verdict + ' &bull; ' + (m.imd_rainfall.report_period || '') + '</div>';
    if (m.imd_rainfall.country_actual_mm !== null) {
      html += '<div class="gauge-wrap"><span style="font-size:0.72rem;color:#888;min-width:60px">Actual</span><div class="gauge"><div class="gauge-fill" style="width:' + Math.min(100, Math.max(5, (m.imd_rainfall.country_actual_mm / (m.imd_rainfall.country_normal_mm || 1)) * 100)) + '%;background:' + (dep < -20 ? '#ff6b6b' : dep > 20 ? '#4ecdc4' : '#6bcb77') + '"></div></div><span class="gauge-label">' + m.imd_rainfall.country_actual_mm + ' mm</span></div>';
      html += '<div class="gauge-wrap"><span style="font-size:0.72rem;color:#888;min-width:60px">Normal</span><div class="gauge"><div class="gauge-fill" style="width:100%;background:#444"></div></div><span class="gauge-label">' + m.imd_rainfall.country_normal_mm + ' mm</span></div>';
    }
    html += '<div class="explain"><strong>What this means:</strong> India has received <strong>' + (dep >= 0 ? dep + '% more' : Math.abs(dep) + '% less') + '</strong> rain than it should have by now. Negative = drought risk for crops. This updates daily during monsoon season (Jun-Sep).</div>';
  } else {
    html += staleBlock('Rainfall data updates during monsoon season (June-September). Off-season gaps are normal.');
  }
  html += sourceLine(m.imd_rainfall);
  html += '</div>';

  // Region-wise breakdown - cartogram + bar
  html += '<div class="metric">';
  html += '<div class="metric-label">Region-wise Rainfall Map</div>';
  if (m.imd_rainfall && m.imd_rainfall.subdivision_data) {
    html += indiaMapSVG(m.imd_rainfall.subdivision_data);
    html += '<div class="explain"><strong>What this means:</strong> Each circle on the India map is one of 36 weather subdivisions. <strong style="color:#0984e3">Blue = excess rain</strong>, <strong style="color:#6bcb77">green = normal</strong>, <strong style="color:#ffa502">orange = deficit</strong>, <strong style="color:#ff4757">red = severe deficit</strong>. Hover on any circle to see details. More red/orange = drought spreading.</div>';
  } else if (m.imd_rainfall && m.imd_rainfall.category_counts) {
    html += catBar(m.imd_rainfall.category_counts);
    html += '<div class="explain"><strong>What this means:</strong> India is divided into 36 weather regions. This bar shows how many have excess rain (blue), normal (green), or deficit (orange/red). More red = more areas are dry.</div>';
  } else {
    html += staleBlock();
  }
  html += '</div>';

  // LRF
  html += '<div class="metric">';
  html += '<div class="metric-label">IMD Season Forecast</div>';
  if (m.imd_lrf && m.imd_lrf.status === 'ok' && m.imd_lrf.value) {
    const lpa = m.imd_lrf.value;
    const vc = lpa < 90 ? 'val-red' : lpa < 96 ? 'val-warm' : lpa <= 104 ? 'val-green' : 'val-blue';
    html += '<div class="metric-value ' + vc + '">' + lpa + '% <span style="font-size:0.9rem;font-weight:500">of LPA</span></div>';
    if (m.imd_lrf.category) html += '<div class="metric-sub">Category: <strong>' + m.imd_lrf.category + '</strong></div>';
    if (m.imd_lrf.issue_date) html += '<div class="metric-sub">Issued: ' + m.imd_lrf.issue_date + '</div>';
    html += '<div class="explain"><strong>What this means:</strong> IMD predicts this year\'s total monsoon rain will be <strong>' + lpa + '% of the long-term average</strong>. 96-104% = Normal. Below 90% = Deficient (bad for crops). This forecast was issued once in April and may be updated in May/June.</div>';
  } else {
    html += staleBlock('IMD releases the Long Range Forecast 1-2 times before monsoon season.');
  }
  html += sourceLine(m.imd_lrf);
  html += '</div>';

  // Reservoir
  html += '<div class="metric">';
  html += '<div class="metric-label">Reservoir Water Levels</div>';
  if (m.cwc_reservoir && m.cwc_reservoir.status === 'ok' && m.cwc_reservoir.live_storage_bcm) {
    const d = m.cwc_reservoir;
    html += '<div class="metric-value val-blue">' + d.live_storage_bcm + ' <span style="font-size:0.9rem;font-weight:500">BCM</span></div>';
    if (d.pct_capacity) {
      html += '<div class="gauge-wrap"><div class="gauge"><div class="gauge-fill" style="width:' + Math.min(100, d.pct_capacity) + '%;background:' + (d.pct_capacity < 30 ? '#ff6b6b' : d.pct_capacity < 60 ? '#ffa502' : '#4ecdc4') + '"></div></div><span class="gauge-label">' + d.pct_capacity + '%</span></div>';
    }
    if (d.avg_10yr_bcm) html += '<div class="metric-sub">10-year avg (same week): ' + d.avg_10yr_bcm + ' BCM</div>';
    if (d.last_year_bcm) html += '<div class="metric-sub">Same week last year: ' + d.last_year_bcm + ' BCM</div>';
    html += '<div class="metric-sub">Bulletin: ' + (d.report_date || '?') + '</div>';
    html += '<div class="explain"><strong>What this means:</strong> India\'s 161 major reservoirs hold <strong>' + d.live_storage_bcm + ' billion cubic metres</strong> of water (' + (d.pct_capacity || '?') + '% full). ' + (d.avg_10yr_bcm ? (d.live_storage_bcm < d.avg_10yr_bcm ? 'This is <strong>below</strong> the 10-year average for this same week (' + d.avg_10yr_bcm + ' BCM) — a concern for irrigation and drinking water.' : 'This is near or above the 10-year average for this week — a healthy sign.') : '') + ' This is an apples-to-apples comparison (same calendar week, not full-year). Updates weekly (Thursdays).</div>';
  } else {
    html += staleBlock('Reservoir bulletin updates weekly on Thursdays. PDF parsing is brittle.');
  }
  html += sourceLine(m.cwc_reservoir);
  html += '</div>';

  // Kharif
  html += '<div class="metric">';
  html += '<div class="metric-label">Crop Sowing Progress (Kharif)</div>';
  if (m.kharif_sowing && m.kharif_sowing.status === 'ok' && m.kharif_sowing.area_current_lakh_ha) {
    const d = m.kharif_sowing;
    html += '<div class="metric-value val-green">' + d.area_current_lakh_ha + ' <span style="font-size:0.9rem;font-weight:500">lakh ha</span></div>';
    if (d.change_pct !== null) {
      const cc = d.change_pct >= 0 ? 'val-green' : 'val-red';
      html += '<div class="metric-sub">vs last year: <strong class="' + cc + '">' + (d.change_pct >= 0 ? '+' : '') + d.change_pct + '%</strong></div>';
    }
    html += '<div class="explain"><strong>What this means:</strong> Kharif = monsoon-season crops (rice, pulses, cotton). This shows how much land has been sown compared to last year. Less sowing = farmers are worried about rain.</div>';
  } else {
    var ks = m.kharif_sowing || {};
    var sowStatus = ks.sowing_status || 'unknown';
    var statusIcon = sowStatus === 'pre_season' ? '&#9203;' : sowStatus === 'early_season' ? '&#127793;' : sowStatus === 'in_season' ? '&#127793;' : '&#9989;';
    var statusLabel = sowStatus === 'pre_season' ? 'Not Yet Started' : sowStatus === 'early_season' ? 'Just Starting' : sowStatus === 'in_season' ? 'Season Active' : sowStatus === 'post_season' ? 'Season Complete' : 'Unknown';
    html += '<div style="margin:8px 0"><span style="font-size:1.4rem">' + statusIcon + '</span> <strong style="color:#ffd93d">' + statusLabel + '</strong></div>';
    if (ks.season_note) html += '<div style="font-size:0.8rem;color:#999;margin:6px 0">' + ks.season_note + '</div>';

    // News-reported context
    if (ks.news_context) {
      var nc = ks.news_context;
      html += '<div style="background:#1a1a28;border-radius:8px;padding:12px 14px;margin:10px 0;border-left:3px solid #ffa502">';
      html += '<div style="font-size:0.7rem;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">From News Reports</div>';
      if (nc.imd_forecast_lpa_pct) {
        var lpaColor = nc.imd_forecast_lpa_pct < 96 ? '#ffa502' : '#6bcb77';
        html += '<div style="margin:4px 0"><strong style="color:' + lpaColor + ';font-size:1.3rem">' + nc.imd_forecast_lpa_pct + '%</strong> <span style="color:#888;font-size:0.8rem">of LPA rainfall forecast by IMD</span></div>';
      }
      if (nc.expected_output_change_pct) {
        var outColor = nc.expected_output_change_pct < 0 ? '#ff6b6b' : '#6bcb77';
        html += '<div style="margin:4px 0"><strong style="color:' + outColor + ';font-size:1.1rem">' + nc.expected_output_change_pct + '%</strong> <span style="color:#888;font-size:0.8rem">expected change in kharif crop output</span></div>';
      }
      html += '<div style="font-size:0.65rem;color:#555;margin-top:6px">Source: ' + nc.source + '</div>';
      html += '</div>';
    }

    html += '<span class="badge badge-stale">OFFICIAL DATA PENDING</span>';
    html += '<div class="explain" style="margin-top:10px"><strong>About Kharif crops:</strong> ' + (ks.crops || 'rice, pulses, oilseeds, cotton, sugarcane') + '.<br><br>';
    html += '<strong>Sowing window:</strong> ' + (ks.sowing_window || 'June-August, depends on monsoon onset') + '<br><br>';
    html += '<strong>Why it matters:</strong> If monsoon rains are delayed or deficient (as El Nino can cause), farmers delay sowing — leading to lower crop output and potential food inflation. ';
    if (dep !== null && dep !== undefined) {
      html += 'Current rainfall is <strong>' + (dep >= 0 ? dep + '% above' : Math.abs(dep) + '% below') + ' normal</strong> — ';
      if (dep >= -10) html += 'sowing should be proceeding normally.';
      else if (dep >= -30) html += 'some sowing delays are likely in deficit regions.';
      else html += 'significant sowing delays are very likely.';
    }
    html += '</div>';
  }
  html += sourceLine(m.kharif_sowing);
  html += '</div>';

  html += '</div></div>'; // end India

  html += '</div>'; // end sections

  // History
  if (history.length > 1) {
    html += '<div class="chart-card">';
    html += '<h3>&#128200; Monsoon Stress Index — Daily Trend</h3>';
    html += '<div style="font-size:0.75rem;color:#666;margin-bottom:10px">How concerned should we be about drought? 0 = no worry, 100 = extreme concern. Combines El Nino strength, IOD, pressure, and actual rainfall.</div>';
    html += '<canvas id="historyChart"></canvas>';
    html += '</div>';
  }

  // Footer
  html += '<div class="footer">';
  html += 'Data fetched daily at 4 AM IST from NOAA, IMD, CWC &bull; "STALE" = source unreachable, never a guessed number<br>';
  html += 'The El Nino-monsoon link is moderate (~-0.5 correlation). This dashboard shows data, not predictions.';
  html += '</div>';

  document.getElementById('app').innerHTML = html;
  if (history.length > 1) drawChart(history);
}

function buildHeroText(m, strength) {
  const nino34 = m.nino34 && m.nino34.value !== null ? m.nino34.value : null;
  const trend = m.nino34 ? m.nino34.trend : 'unknown';
  const iod = m.iod_dmi;
  const rain = m.imd_rainfall;
  const dep = rain && rain.country_departure_pct;

  let t = '';
  t += '<strong>El Nino is ' + strength.label.toLowerCase() + '</strong>';
  if (nino34 !== null) t += ' (Pacific is ' + (nino34 >= 0 ? '+' : '') + nino34.toFixed(2) + '°C above normal)';
  t += ' and <strong>' + trend + '</strong>. ';

  if (iod && iod.phase) {
    t += 'The Indian Ocean Dipole is <strong>' + iod.phase.toLowerCase() + '</strong> — ';
    if (iod.phase === 'Positive') t += 'this is good news, as it tends to push more rain toward India, softening El Nino\'s blow. ';
    else if (iod.phase === 'Negative') t += 'this is concerning, as it tends to pull moisture away from India, worsening drought risk. ';
    else t += 'meaning El Nino\'s impact on India is uncertain and depends on other weather patterns. ';
  }

  if (dep !== null && dep !== undefined) {
    t += 'India\'s monsoon rainfall is currently <strong>' + (dep >= 0 ? dep + '% above' : Math.abs(dep) + '% below') + ' normal</strong>. ';
  }

  t += '<br><br><em style="color:#888;font-size:0.85rem">Note: El Nino makes drought more likely but is NOT a guarantee — the historical correlation is only about -0.5. Many El Nino years still had normal monsoons.</em>';
  return t;
}

function drawChart(history) {
  const canvas = document.getElementById('historyChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.parentElement.clientWidth - 40;
  const H = 220;
  canvas.width = W * 2; canvas.height = H * 2;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.scale(2, 2);

  const pad = { top: 25, right: 20, bottom: 40, left: 45 };
  const cw = W - pad.left - pad.right;
  const ch = H - pad.top - pad.bottom;

  const stress = history.map(h => h.stress_index).filter(v => v !== null && v !== undefined);
  const dates = history.map(h => h.date).filter((v, i) => history[i].stress_index !== null && history[i].stress_index !== undefined);

  if (stress.length < 2) {
    ctx.fillStyle = '#555';
    ctx.font = '12px Inter, sans-serif';
    ctx.fillText('Need 2+ days of data for a trend line — check back tomorrow!', pad.left, H/2);
    return;
  }

  const minV = 0, maxV = 100, range = 100;

  // Colored zones: green (0-30), yellow (30-50), orange (50-70), red (70-100)
  const zones = [
    { from: 0, to: 30, color: '#6bcb7710', label: 'Low' },
    { from: 30, to: 50, color: '#ffd93d10', label: 'Moderate' },
    { from: 50, to: 70, color: '#ffa50210', label: 'Elevated' },
    { from: 70, to: 100, color: '#ff475710', label: 'High' },
  ];
  zones.forEach(z => {
    const y1 = pad.top + ch - (z.to / range * ch);
    const y2 = pad.top + ch - (z.from / range * ch);
    ctx.fillStyle = z.color;
    ctx.fillRect(pad.left, y1, cw, y2 - y1);
    ctx.fillStyle = '#333';
    ctx.font = '9px Inter, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(z.label, pad.left + 4, y1 + 11);
  });

  // Grid lines at 0,25,50,75,100
  ctx.strokeStyle = '#1e1e2e';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const val = i * 25;
    const y = pad.top + ch - (val / range * ch);
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + cw, y); ctx.stroke();
    ctx.fillStyle = '#555'; ctx.font = '10px Inter, sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(val, pad.left - 6, y + 4);
  }

  // Area fill under stress line
  const stressColor = function(v) {
    if (v >= 70) return '#ff4757';
    if (v >= 50) return '#ffa502';
    if (v >= 30) return '#ffd93d';
    return '#6bcb77';
  };
  const latestColor = stressColor(stress[stress.length - 1]);

  ctx.beginPath();
  stress.forEach((v, i) => {
    const x = pad.left + (cw * i / (stress.length - 1));
    const y = pad.top + ch - (v / range * ch);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.lineTo(pad.left + cw, pad.top + ch);
  ctx.lineTo(pad.left, pad.top + ch);
  ctx.closePath();
  ctx.fillStyle = latestColor + '18';
  ctx.fill();

  // Stress line
  ctx.strokeStyle = latestColor; ctx.lineWidth = 2.5;
  ctx.beginPath();
  stress.forEach((v, i) => {
    const x = pad.left + (cw * i / (stress.length - 1));
    const y = pad.top + ch - (v / range * ch);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Dots with color per value
  stress.forEach((v, i) => {
    const x = pad.left + (cw * i / (stress.length - 1));
    const y = pad.top + ch - (v / range * ch);
    const c = stressColor(v);
    ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#0a0a0f'; ctx.fill();
    ctx.strokeStyle = c; ctx.lineWidth = 2.5; ctx.stroke();
    ctx.fillStyle = '#ddd'; ctx.font = 'bold 9px Inter, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(v, x, y - 10);
  });

  // Date labels on x-axis
  ctx.fillStyle = '#555'; ctx.font = '9px Inter, sans-serif'; ctx.textAlign = 'center';
  const maxLabels = Math.min(dates.length, 10);
  const step = Math.max(1, Math.floor(dates.length / maxLabels));
  for (let i = 0; i < dates.length; i += step) {
    const x = pad.left + (cw * i / (stress.length - 1));
    const d = new Date(dates[i]);
    const label = d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
    ctx.fillText(label, x, pad.top + ch + 16);
  }
  if ((dates.length - 1) % step !== 0) {
    const x = pad.left + cw;
    const d = new Date(dates[dates.length - 1]);
    ctx.fillText(d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }), x, pad.top + ch + 16);
  }

  // Title below
  ctx.fillStyle = '#666'; ctx.font = '10px Inter, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('Monsoon Stress Index over time (0 = calm, 100 = extreme concern)', pad.left + cw / 2, H - 4);
}

loadData();
</script>
