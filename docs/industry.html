<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Industry Sectors — India El Nino Monsoon Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌊</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', -apple-system, sans-serif; background: #0a0a0f; color: #e0e0e0; line-height: 1.6; min-height: 100vh; }
.container { max-width: 900px; margin: 0 auto; padding: 20px 16px; }
.header { text-align: center; padding: 20px 0 10px; }
.header h1 { font-size: 1.6rem; font-weight: 900; background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.tab-nav { display: flex; justify-content: center; gap: 4px; margin: 16px 0; flex-wrap: wrap; }
.tab-nav a { padding: 8px 16px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #888; text-decoration: none; border-radius: 6px; border: 1px solid transparent; transition: all 0.2s; }
.tab-nav a:hover { color: #ddd; border-color: #2a2a3a; background: #1a1a28; }
.tab-nav a.active { color: #4ecdc4; border-color: #4ecdc444; background: #4ecdc410; }
.disclaimer { background: #1a1a28; border: 1px solid #ff6b6b33; border-radius: 8px; padding: 10px 16px; margin-bottom: 20px; font-size: 0.72rem; color: #bbb; text-align: center; }
.disclaimer strong { color: #ff6b6b; }

.summary-box { background: linear-gradient(135deg, #1a1a2e, #16213e); border: 1px solid #2a2a4a; border-radius: 12px; padding: 22px 26px; margin-bottom: 24px; }
.summary-box h2 { font-size: 1rem; font-weight: 800; color: #ffd93d; margin-bottom: 10px; }
.summary-box p { font-size: 0.82rem; color: #ccc; margin-bottom: 8px; line-height: 1.7; }
.summary-box .hl { color: #fff; font-weight: 700; }

.ranking-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 0.78rem; }
.ranking-table th { background: #1a1a28; color: #888; font-weight: 600; text-align: left; padding: 10px 12px; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.3px; }
.ranking-table td { padding: 12px; border-bottom: 1px solid #1a1a28; }
.ranking-table tr:hover { background: #12121a; }
.sector-name { font-weight: 700; color: #fff; }
.sector-mechanism { font-size: 0.7rem; color: #888; margin-top: 2px; }
.bar-container { width: 100%; height: 6px; background: #1a1a28; border-radius: 3px; overflow: hidden; margin-top: 4px; }
.bar-fill { height: 100%; border-radius: 3px; }

.section-title { font-size: 0.9rem; font-weight: 800; color: #fff; margin: 28px 0 12px; padding-bottom: 8px; border-bottom: 1px solid #1e1e2e; }
.card { background: #12121a; border: 1px solid #1e1e2e; border-radius: 12px; padding: 18px; margin-bottom: 12px; }
.card h3 { font-size: 0.85rem; font-weight: 700; color: #fff; margin-bottom: 4px; }
.card .plain { font-size: 0.76rem; color: #aaa; margin: 6px 0; line-height: 1.6; }
.stat-row { display: flex; gap: 10px; flex-wrap: wrap; margin: 10px 0; }
.stat-box { background: #0e0e16; border: 1px solid #1e1e30; border-radius: 8px; padding: 8px 12px; text-align: center; min-width: 100px; }
.stat-box .num { font-size: 1.2rem; font-weight: 800; }
.stat-box .lbl { font-size: 0.58rem; color: #666; text-transform: uppercase; margin-top: 2px; }
.val-red { color: #ff6b6b; }
.val-green { color: #6bcb77; }
.val-amber { color: #ffa502; }

.footer { border-top: 1px solid #1a1a28; padding: 20px 0; margin-top: 30px; font-size: 0.68rem; color: #555; text-align: center; }
.footer a { color: #4ecdc4; text-decoration: none; }
@media (max-width: 600px) {
  .ranking-table { font-size: 0.7rem; }
  .ranking-table th, .ranking-table td { padding: 8px 6px; }
  .stat-row { flex-direction: column; }
}
</style>
</head>
<body>
<div class="container">
  <div class="header"><h1>India El Nino Monsoon Tracker</h1></div>
  <nav class="tab-nav">
    <a href="index.html">Weather</a>
    <a href="macro.html">Macro</a>
    <a href="industry.html" class="active">Industry</a>
    <a href="stocks.html">Stocks</a>
  </nav>
  <div class="disclaimer"><strong>&#9888; Not investment advice.</strong> Shows how sector indices historically performed relative to Nifty50 during weak monsoon years. Small samples. Past ≠ future.</div>
  <div id="app">Loading...</div>
</div>
<script>
async function loadData() {
  try {
    const analysis = await fetch('analysis.json').then(r => r.json());
    render(analysis);
  } catch(e) {
    document.getElementById('app').innerHTML = '<p style="color:#ff6b6b">Error: ' + e.message + '</p>';
  }
}

function render(a) {
  const w = a.rainfall_weights_2026;
  const sectors = a.sectors;
  let html = '';

  // Plain English intro
  html += '<div class="summary-box">';
  html += '<h2>Which Sectors Win or Lose in a Weak Monsoon?</h2>';
  html += '<p>We measure <span class="hl">"excess return"</span> — how much a sector outperforms or underperforms the Nifty50 during June-September (monsoon season).</p>';
  html += '<p>For example, if Nifty50 returns +5% and FMCG returns +2% during a drought monsoon, then FMCG has an excess return of <span class="hl" style="color:#ff6b6b">-3%</span> (it underperformed by 3 points).</p>';
  html += '<p>Below is the historical ranking — <span class="hl" style="color:#ff6b6b">red = tends to underperform in drought</span>, <span class="hl" style="color:#6bcb77">green = tends to outperform</span>.</p>';
  html += '</div>';

  // Rankings table
  if (sectors && sectors.rankings && sectors.rankings.length) {
    var rankings = sectors.rankings;
    var maxAbs = Math.max.apply(null, rankings.map(function(r){return Math.abs(r.weighted_mean_excess);}));

    html += '<div class="section-title">Sector Ranking: Best to Worst in a Drought</div>';
    html += '<table class="ranking-table">';
    html += '<tr><th>#</th><th>Sector</th><th>Expected Excess Return</th><th>Chance of Underperforming Nifty</th></tr>';

    // Sort from best (positive) to worst (negative)
    var sorted = rankings.slice().sort(function(a,b){return b.weighted_mean_excess - a.weighted_mean_excess;});

    sorted.forEach(function(r, i) {
      var color = r.weighted_mean_excess > 2 ? '#6bcb77' : r.weighted_mean_excess < -2 ? '#ff6b6b' : '#ffa502';
      var barWidth = Math.abs(r.weighted_mean_excess) / maxAbs * 100;
      html += '<tr>';
      html += '<td style="color:#555">' + (i+1) + '</td>';
      html += '<td><div class="sector-name">' + r.sector + '</div>';

      // Get mechanism
      var sectorData = sectors.sectors[r.key];
      if (sectorData && sectorData.mechanism) {
        html += '<div class="sector-mechanism">' + sectorData.mechanism + '</div>';
      }
      html += '</td>';
      html += '<td><span style="color:' + color + ';font-weight:700">' + (r.weighted_mean_excess > 0 ? '+' : '') + r.weighted_mean_excess + '%</span>';
      html += '<div class="bar-container"><div class="bar-fill" style="width:' + barWidth + '%;background:' + color + '"></div></div></td>';
      html += '<td style="color:' + (r.p_negative > 60 ? '#ff6b6b' : r.p_negative > 40 ? '#ffa502' : '#6bcb77') + '">' + r.p_negative + '%</td>';
      html += '</tr>';
    });
    html += '</table>';
  }

  // Detailed sector cards
  html += '<div class="section-title">Sector Detail</div>';

  if (sectors && sectors.sectors) {
    Object.keys(sectors.sectors).forEach(function(key) {
      var s = sectors.sectors[key];
      var monsoon = s.monsoon_window;
      if (!monsoon || !monsoon.outlook_2026) return;
      var o = monsoon.outlook_2026;
      var color = o.weighted_mean < -2 ? 'val-red' : o.weighted_mean > 2 ? 'val-green' : 'val-amber';

      html += '<div class="card">';
      html += '<h3>' + s.name + '</h3>';
      html += '<div class="plain"><strong>Why:</strong> ' + s.mechanism + '</div>';
      html += '<div class="stat-row">';
      html += '<div class="stat-box"><div class="num ' + color + '">' + (o.weighted_mean > 0 ? '+' : '') + o.weighted_mean + '%</div><div class="lbl">Monsoon Excess</div></div>';
      html += '<div class="stat-box"><div class="num">' + o.p_negative + '%</div><div class="lbl">P(Underperform)</div></div>';
      html += '<div class="stat-box"><div class="num">' + o.p_worse_than_minus5 + '%</div><div class="lbl">P(>5% worse)</div></div>';
      html += '</div>';

      // Show bucket breakdown
      if (monsoon.by_rainfall_bucket) {
        var buckets = monsoon.by_rainfall_bucket;
        html += '<div class="plain" style="margin-top:8px">';
        if (buckets.LOW) html += '<strong>Drought years (n=' + buckets.LOW.n + '):</strong> avg ' + buckets.LOW.mean + '% excess. ';
        if (buckets.NORMAL) html += '<strong>Normal years (n=' + buckets.NORMAL.n + '):</strong> avg ' + buckets.NORMAL.mean + '% excess. ';
        if (buckets.HIGH) html += '<strong>High rain (n=' + buckets.HIGH.n + '):</strong> avg ' + buckets.HIGH.mean + '%.';
        html += '</div>';
      }

      // Post-monsoon
      if (s.post_monsoon && s.post_monsoon.outlook_2026) {
        var po = s.post_monsoon.outlook_2026;
        var pColor = po.weighted_mean < -2 ? 'val-red' : po.weighted_mean > 2 ? 'val-green' : 'val-amber';
        html += '<div class="plain" style="margin-top:8px"><strong>Post-monsoon (Oct-Mar):</strong> <span class="' + pColor + '">' + (po.weighted_mean > 0 ? '+' : '') + po.weighted_mean + '%</span> expected excess return — shows whether the effect reverses or persists after the season.</div>';
      }

      html += '</div>';
    });
  }

  // Explanation box
  html += '<div class="card" style="border-color:#ffd93d33">';
  html += '<h3 style="color:#ffd93d">How to Read This</h3>';
  html += '<div class="plain">';
  html += '<strong>What is "Expected Excess Return"?</strong><br>';
  html += 'It measures how much a sector beats or lags the Nifty50 index. For example:<br>';
  html += '• If Nifty50 goes up 10% and Nifty Auto goes up 7%, Auto\'s excess return = <strong style="color:#ff6b6b">-3%</strong> (it underperformed by 3 points)<br>';
  html += '• If Nifty50 goes up 10% and Nifty Pharma goes up 14%, Pharma\'s excess return = <strong style="color:#6bcb77">+4%</strong> (it beat the market by 4 points)<br>';
  html += '• A positive excess return does NOT mean the sector went up — just that it did <em>better than the market average</em><br><br>';
  html += '<strong>Why excess matters instead of absolute return:</strong> In 2009, markets rallied 76% during a severe drought because of global QE stimulus. Every sector went up. But <em>relative to the market</em>, rural/agri sectors still lagged. Excess return captures "who loses more or less than average" regardless of the market direction.<br><br>';
  html += '<strong>"P(Underperform)"</strong> is the probability-weighted chance this sector does WORSE than Nifty50 (negative excess). Higher number = more likely to lag the market.';
  html += '</div></div>';

  // Data reliability warning
  html += '<div class="card" style="border-color:#ff6b6b33">';
  html += '<h3 style="color:#ff6b6b">Data Reliability Warning</h3>';
  html += '<div class="plain">';
  html += 'The sector excess return data is based on <strong>approximate historical estimates</strong> compiled from NSE index data (2004-2024). Individual year values may have measurement gaps. With only ~5-8 drought years in the sample, a single outlier year (like 2009\'s massive rally) can heavily skew averages. ';
  html += 'Some results may appear counterintuitive (e.g., a sector showing positive excess in drought years) because the sample is tiny and global/macro factors often overwhelm the monsoon signal. ';
  html += '<strong>Treat these as directional indicators, not precise forecasts.</strong>';
  html += '</div></div>';

  html += '<div class="footer"><a href="about.html">Methodology</a> | <a href="stocks.html">Individual Stocks &rarr;</a> | <a href="index.html">&larr; Weather</a></div>';
  document.getElementById('app').innerHTML = html;
}

loadData();
</script>
</body>
</html>
